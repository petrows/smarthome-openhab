# JS Scripting (GraalJS) automation add-on configuration
# PID: org.openhab.jsscripting
#
# All parameters are listed explicitly for documentation purposes.
# Everything is at its default value, except debuggerEnabled.

# === JavaScript Environment

# Inject global variables from the openhab-js helper library:
# 0 = disabled, 1 = enabled for all scripts, 3 = enabled for UI-based rules only
# File-based scripts always use require('openhab') explicitly. (default: 3)
injectionEnabledV2=3

# Cache the injected openhab-js library to speed up script loading (default: true)
injectionCachingEnabled=true

# Wrap script conditions in a self-executing function, allowing explicit
# `return` statements in inline conditions (default: false)
scriptConditionWrapperEnabled=false

# Convert Java event types to JavaScript types in script actions/conditions (default: true)
eventConversionEnabled=true

# === System Behavior

# Track script dependencies and reload scripts when they change (default: true)
dependencyTrackingEnabled=true

# Engine lock acquisition timeout, seconds (default: 5)
lockAcquisitionTimeout=5

# === Debugger Support

# Chrome DevTools Protocol debugger (VS Code / Chrome).
# Restart openHAB after changing; port must be published in docker-compose.
# (default: false)
debuggerEnabled=true

# Debugger port (default: 9229)
debuggerPort=9229
